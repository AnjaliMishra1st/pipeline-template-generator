<!DOCTYPE html>
<html>
<head>
    <title>Pipeline Template Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pipeline Template Generator ☁️</h1>

    <label>Select Tech Stack:</label>
    <select id="tech">
        <option>Node.js</option>
        <option>Python</option>
    </select>

    <br><br>

    <label>Select Pipeline:</label>
    <select id="pipeline">
        <option>Dockerfile</option>
        <option>Jenkinsfile</option>
        <option>GitHub Actions</option>
    </select>

    <br><br>

    <button onclick="generateTemplate()">Generate</button>

    <h3>Generated Template:</h3>
    <pre id="output"></pre>

    <script src="script.js"></script>
</body>
</html>
